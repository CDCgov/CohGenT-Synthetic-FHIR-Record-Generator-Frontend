<table mat-table [dataSource]="dataSource()">

  <ng-container matColumnDef="display">
    <th mat-header-cell *matHeaderCellDef> Display </th>
    <td mat-cell *matCellDef="let element"> {{element.concept.display}} </td>
  </ng-container>

  <ng-container matColumnDef="code">
    <th mat-header-cell *matHeaderCellDef> Code </th>
    <td mat-cell *matCellDef="let element"> {{element.concept.code}} </td>
  </ng-container>

  <ng-container matColumnDef="system">
    <th mat-header-cell *matHeaderCellDef> System </th>
    <td mat-cell *matCellDef="let element"> {{element.concept | systemStr}} </td>
  </ng-container>

  <ng-container matColumnDef="dosage">
    <th mat-header-cell *matHeaderCellDef> Dosage Instructions </th>
    <td mat-cell *matCellDef="let element"> {{element.dosage}} </td>
  </ng-container>

  <tr class="mat-row" *matNoDataRow>
    <td class="mat-cell no-records-returned-msg" [attr.colspan]="displayedColumns.length">
      No Medication Data.
    </td>
  </tr>


  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
