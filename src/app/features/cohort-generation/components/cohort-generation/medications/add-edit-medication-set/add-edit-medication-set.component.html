<div #medicationsContainer class="panel">

  <div class="d-flex mb-3">
    <h2 class="title-label mt-0">Medication Set {{ medicationSetFg().get('nameCounter').value }}</h2>
  </div>

  <div class="mb-3">
    <button class="secondary-btn" matButton="filled" (click)="addMedication()">
      <mat-icon>add</mat-icon>
      Add Medication
    </button>
  </div>

  <div class="panel gray-bg">
    @for (medicationFg of medicationFromArray?.controls; track medicationFg; let i = $index) {
      <app-medication-form
        [medicationForm]="$any(medicationFg)"
        [index]="i"
        (delete)="onDeleteMedication(i)"
      />
    }
  </div>

  <div class="d-flex justify-content-end mt-4 pt-4 border-t">
    <button
      matButton="outlined" class="margin-right-sm" type="button"
      (click)="onCancelMedicationSetEdit()">
      Cancel
    </button>
    <button
      type="submit"
      matButton="filled"
      class="btn-success w-25"
      (click)="onSaveMedicationSet()">
      Save Medication Set
    </button>
  </div>
</div>
